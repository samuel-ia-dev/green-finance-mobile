    <style id="green-finance-install">
      #gf-install {
        position: fixed;
        inset: auto 0 0 0;
        z-index: 9999;
        padding: 16px;
        display: flex;
        justify-content: center;
        pointer-events: none;
      }

      #gf-install[hidden] {
        display: none;
      }

      #gf-install-card {
        width: min(100%, 420px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        background: rgba(7, 12, 24, 0.96);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
        color: #f8fafc;
        padding: 18px;
        pointer-events: auto;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #gf-install-head {
        display: flex;
        gap: 14px;
        align-items: center;
      }

      #gf-install-icon {
        width: 60px;
        height: 60px;
        border-radius: 18px;
        background: #ffffff;
        object-fit: cover;
        flex: 0 0 auto;
      }

      #gf-install-title {
        margin: 0;
        font-size: 18px;
        font-weight: 800;
      }

      #gf-install-text {
        margin: 6px 0 0;
        color: #cbd5e1;
        font-size: 14px;
        line-height: 1.45;
      }

      #gf-install-actions {
        display: flex;
        gap: 10px;
        margin-top: 16px;
      }

      #gf-install-primary,
      #gf-install-secondary {
        border: 0;
        border-radius: 14px;
        padding: 12px 14px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }

      #gf-install-primary {
        flex: 1;
        background: #f59e0b;
        color: #111827;
      }

      #gf-install-secondary {
        background: rgba(255, 255, 255, 0.08);
        color: #f8fafc;
      }

      #gf-install-hint {
        margin-top: 12px;
        font-size: 12px;
        line-height: 1.5;
        color: #94a3b8;
      }

</head>

          <div>

        </div>
        <div id="gf-install-hint">Se o navegador nao mostrar o popup, use o menu e toque em "Adicionar a tela inicial" ou "Instalar app".</div>
      </div>
    </div>
